name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  api:
    name: Python API (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: apps/api/requirements.txt
      - name: Install API (with dev extras)
        run: pip install -e '.[dev]'
      - name: Run pytest
        run: python -m pytest -q

  web-types:
    name: Web (typecheck + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint --if-present

  web-build:
    name: Web (next build)
    runs-on: ubuntu-latest
    needs: web-types
    defaults:
      run:
        working-directory: apps/web
    env:
      # CI のビルドは Supabase に到達しないため placeholder で十分。
      # 実際のデプロイ用 secret は Vercel 側で管理する。
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role
      PYTHON_API_URL: http://placeholder.local
      PYTHON_API_KEY: placeholder-api-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
      - name: npm ci
        run: npm ci
      - name: next build
        run: npm run build
